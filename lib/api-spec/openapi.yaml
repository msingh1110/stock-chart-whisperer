openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Trading signals API powered by Alpaca Markets
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: signals
    description: Trading signal operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /signals:
    get:
      operationId: getAllSignals
      tags: [signals]
      summary: Get trading signals for all portfolio stocks
      description: Returns signals for NVDA, MSFT, AAPL, META, SOFI, HOOD
      responses:
        "200":
          description: List of stock signals
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/StockSignal"
        "500":
          description: Error fetching signals
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /signals/{ticker}:
    get:
      operationId: getSignalByTicker
      tags: [signals]
      summary: Get signal and price history for a specific stock
      parameters:
        - name: ticker
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Stock signal with full price history
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StockSignalDetail"
        "404":
          description: Ticker not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "500":
          description: Error fetching signal
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /portfolio/summary:
    get:
      operationId: getPortfolioSummary
      tags: [signals]
      summary: Get a portfolio-level summary of all signals
      responses:
        "200":
          description: Portfolio summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PortfolioSummary"
        "500":
          description: Error fetching summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ApiError:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    SignalType:
      type: string
      enum: [BUY, SELL, HOLD]

    ConfidenceTier:
      type: string
      enum: [STRONG BUY, BUY, HOLD, SELL, STRONG SELL]

    StockSignal:
      type: object
      properties:
        ticker:
          type: string
        currentPrice:
          type: number
        prevClose:
          type: number
          description: Previous session closing price
        ma20:
          type: number
        ma50:
          type: number
        rsi:
          type: number
        price5dAgo:
          type: number
          description: Closing price 5 trading days ago
        signal:
          $ref: "#/components/schemas/SignalType"
        confidenceTier:
          $ref: "#/components/schemas/ConfidenceTier"
        change:
          type: number
          description: Price change from previous close
        changePercent:
          type: number
          description: Percentage price change from previous close
        lastUpdated:
          type: string
          description: ISO timestamp of when data was last fetched
        upProbability:
          type: number
          description: Probability score (0-100) that the stock moves up
        downProbability:
          type: number
          description: Probability score (0-100) that the stock moves down
        finalScore:
          type: number
          description: Weighted final score in roughly [-1, +1]
        trendScore:
          type: number
          description: Trend component score in [-1, +1]
        momentumScore:
          type: number
          description: Momentum component score in [-1, +1]
        rsiScore:
          type: number
          description: RSI component score
        volumeScore:
          type: number
          description: Volume confirmation score (-1, 0, or +1)
        momentum:
          type: number
          description: Raw 5-day price momentum as a decimal fraction
        volume:
          type: number
          description: Most-recent bar volume
        averageVolume:
          type: number
          description: Average daily volume over last 20 bars
        volumeRatio:
          type: number
          description: current volume / average volume
        explanation:
          type: string
          description: Human-readable signal explanation built from component scores
        company:
          type: string
          description: Full company name (empty string if unavailable)
      required:
        - ticker
        - currentPrice
        - prevClose
        - ma20
        - ma50
        - rsi
        - price5dAgo
        - signal
        - confidenceTier
        - explanation
        - change
        - changePercent
        - lastUpdated
        - upProbability
        - downProbability
        - finalScore
        - trendScore
        - momentumScore
        - rsiScore
        - volumeScore
        - momentum
        - volume
        - averageVolume
        - volumeRatio
        - company

    PriceBar:
      type: object
      properties:
        date:
          type: string
          description: Date in YYYY-MM-DD format
        close:
          type: number
        open:
          type: number
        high:
          type: number
        low:
          type: number
        volume:
          type: number
        ma20:
          type: ["number", "null"]
        ma50:
          type: ["number", "null"]
      required:
        - date
        - close
        - open
        - high
        - low
        - volume
        - ma20
        - ma50

    StockSignalDetail:
      type: object
      properties:
        ticker:
          type: string
        currentPrice:
          type: number
        prevClose:
          type: number
          description: Previous session closing price
        ma20:
          type: number
        ma50:
          type: number
        rsi:
          type: number
        price5dAgo:
          type: number
          description: Closing price 5 trading days ago
        signal:
          $ref: "#/components/schemas/SignalType"
        confidenceTier:
          $ref: "#/components/schemas/ConfidenceTier"
        change:
          type: number
        changePercent:
          type: number
        lastUpdated:
          type: string
        upProbability:
          type: number
          description: Probability score (0-100) that the stock moves up
        downProbability:
          type: number
          description: Probability score (0-100) that the stock moves down
        finalScore:
          type: number
          description: Weighted final score in roughly [-1, +1]
        trendScore:
          type: number
          description: Trend component score in [-1, +1]
        momentumScore:
          type: number
          description: Momentum component score in [-1, +1]
        rsiScore:
          type: number
          description: RSI component score
        volumeScore:
          type: number
          description: Volume confirmation score (-1, 0, or +1)
        momentum:
          type: number
          description: Raw 5-day price momentum as a decimal fraction
        volume:
          type: number
          description: Most-recent bar volume
        averageVolume:
          type: number
          description: Average daily volume over last 20 bars
        volumeRatio:
          type: number
          description: current volume / average volume
        explanation:
          type: string
          description: Human-readable signal explanation built from component scores
        company:
          type: string
          description: Full company name (empty string if unavailable)
        priceHistory:
          type: array
          items:
            $ref: "#/components/schemas/PriceBar"
      required:
        - ticker
        - currentPrice
        - prevClose
        - ma20
        - ma50
        - rsi
        - price5dAgo
        - signal
        - confidenceTier
        - explanation
        - change
        - changePercent
        - lastUpdated
        - upProbability
        - downProbability
        - finalScore
        - trendScore
        - momentumScore
        - rsiScore
        - volumeScore
        - momentum
        - volume
        - averageVolume
        - volumeRatio
        - company
        - priceHistory

    PortfolioSummary:
      type: object
      properties:
        totalStocks:
          type: number
        buyCount:
          type: number
        sellCount:
          type: number
        holdCount:
          type: number
        lastUpdated:
          type: string
        tickers:
          type: array
          items:
            type: string
      required:
        - totalStocks
        - buyCount
        - sellCount
        - holdCount
        - lastUpdated
        - tickers
